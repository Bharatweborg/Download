<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:2.5rem;
}

.subtitle{
    text-align:center;
    color:#ddd;
    margin-bottom:30px;
}

.file-card{
    background:rgba(255,255,255,0.12);
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.file-card:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.18);
}

.file-info h3{
    margin-bottom:5px;
}

.file-info p{
    color:#ddd;
    font-size:14px;
}

.download-btn{
    background:#00c853;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.download-btn:hover{
    background:#00a843;
}

@media(max-width:600px){

    h1{
        font-size:2rem;
    }

    .file-card{
        flex-direction:column;
        text-align:center;
        gap:15px;
    }

    .download-btn{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>📂 Download Center</h1>
    <p class="subtitle">Download files quickly and securely</p>

    <div class="file-card">
        <div class="file-info">
            <h3>📄 E Call Letter.pdf</h3>
            <p>PDF Document</p>
        </div>
        <a href="files/E Call Letter.pdf" class="download-btn" download>
            Download
        </a>
    </div>

    <div class="file-card">
        <div class="file-info">
            <h3>💻 Software.zip</h3>
            <p>ZIP Archive • 45 MB</p>
        </div>
        <a href="files/software.zip" class="download-btn" download>
            Download
        </a>
    </div>

    <div class="file-card">
        <div class="file-info">
            <h3>📘 Notes.docx</h3>
            <p>Word Document • 1.1 MB</p>
        </div>
        <a href="files/notes.docx" class="download-btn" download>
            Download
        </a>
    </div>

</div>

</body>
</html>
